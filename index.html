<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লেনদেন খাতা</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; color: #333; line-height: 1.6; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px 0; }
        
        .wrapper { width: 100%; max-width: 800px; background: white; min-height: 95vh; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { background-color: #2c3e50; color: white; padding: 15px 20px; font-size: 20px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logout-btn { background: #e74c3c; padding: 6px 12px; font-size: 13px; width: auto; border-radius: 5px; }
        
        .auth-card { width: 100%; max-width: 420px; margin: auto; padding: 30px; background: #fff; border-radius: 12px; }
        .auth-title { text-align: center; color: #2c3e50; margin-bottom: 25px; font-size: 26px; }
        
        .auth-nav { display: flex; background: #ecf0f1; border-radius: 8px; padding: 4px; margin-bottom: 25px; gap: 4px; }
        .auth-nav button { flex: 1; background: transparent; border: none; padding: 10px 5px; font-size: 13px; color: #7f8c8d; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .auth-nav button.active { background: #2c3e50; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        input, select { width: 100%; padding: 12px 15px; margin-bottom: 15px; border: 1px solid #bdc3c7; border-radius: 8px; font-size: 15px; transition: border-color 0.3s; }
        input:focus { border-color: #2c3e50; outline: none; box-shadow: 0 0 0 3px rgba(44, 62, 80, 0.1); }
        button.btn-action { background-color: #2c3e50; color: white; border: none; cursor: pointer; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        button.btn-action:hover { background-color: #34495e; }
        button:disabled { background-color: #95a5a6 !important; cursor: not-allowed; }
        
        .status-text { font-size: 13px; margin-top: -10px; margin-bottom: 10px; padding-left: 5px; }

        .nav { display: flex; background: #34495e; padding: 0; overflow-x: auto; }
        .nav button { flex: 1; background: none; border: none; color: #bdc3c7; cursor: pointer; font-size: 15px; padding: 15px 10px; text-align: center; white-space: nowrap; transition: 0.3s; border-bottom: 3px solid transparent; }
        .nav button.active { color: #fff; background: #2c3e50; border-bottom: 3px solid #e74c3c; font-weight: bold; }
        .nav button:hover { color: #fff; }
        
        .section { padding: 25px; flex-grow: 1; overflow-y: auto; display: none; }
        .section.active { display: block; }
        .section h3 { margin-bottom: 20px; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; font-size: 18px; }
        
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 15px; border-radius: 8px; border: 1px solid #ecf0f1; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; } /* মোবাইল ভিউতে এক লাইনে দেখানোর জন্য min-width বাড়ানো হয়েছে */
        th, td { border-bottom: 1px solid #ecf0f1; padding: 12px 10px; text-align: left; font-size: 14px; white-space: nowrap; } /* white-space: nowrap যুক্ত করা হয়েছে */
        th { background-color: #f8f9fa; color: #2c3e50; font-weight: 600; position: sticky; top: 0; }
        tr:hover { background-color: #f1f1f1; }
        .btn-sm { padding: 6px 12px; font-size: 12px; width: auto; margin-right: 5px; border-radius: 5px; border: none; cursor: pointer; color: white; font-weight: bold;}
        .bg-red { background: #e74c3c; }
        .bg-orange { background: #f39c12; }
        .bg-blue { background: #3498db; }

        .outstanding-card { background: #fff; padding: 15px; margin-bottom: 15px; border-left: 5px solid #e74c3c; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; border: 1px solid #eee; border-left: 5px solid #e74c3c; }
        .outstanding-card .info { flex: 1; min-width: 200px; }
        .outstanding-card .amount { font-weight: bold; font-size: 18px; color: #e74c3c; text-align: right; }
        .total-box { background: #2c3e50; color: white; padding: 15px; border-radius: 8px; text-align: right; font-weight: bold; font-size: 18px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .toast { visibility: hidden; min-width: 250px; width: 90%; max-width: 400px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; font-size: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        .toast.error { background-color: #e74c3c; }
        .toast.success { background-color: #27ae60; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.6); }
        .modal-content { background-color: #fff; margin: 10% auto; padding: 25px; border-radius: 12px; width: 90%; max-width: 450px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close-btn:hover { color: #333; }

        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .pagination button { width: auto; padding: 8px 16px; border-radius: 6px; border: none; background: #2c3e50; color: white; cursor: pointer; font-weight: bold; }
        .page-info { padding: 8px 16px; border: 1px solid #ddd; border-radius: 6px; display: flex; align-items: center; font-size: 14px; color: #555; }

        @media (min-width: 768px) {
            .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
            .form-grid .full-width { grid-column: span 2; }
        }
        
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #empty-home { text-align: center; padding-top: 80px; color: #95a5a6; }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Auth Section -->
    <div id="auth-section" style="display:flex; flex-direction:column; justify-content:center; flex-grow:1;">
        <div class="auth-card">
            <h2 class="auth-title">লেনদেন খাতা</h2>
            
            <div class="auth-nav">
                <button onclick="showAuthView('login')" id="btn-login" class="active">লগ ইন</button>
                <button onclick="showAuthView('signup')" id="btn-signup">সাইন আপ</button>
                <button onclick="showAuthView('reset')" id="btn-reset">পাসওয়ার্ড পুনরুদ্ধার</button>
            </div>

            <!-- Login View -->
            <div id="login-view" class="auth-view">
                <input type="text" id="login-identifier" list="saved-users" placeholder="ইমেইল বা ইউজারনেম">
                <datalist id="saved-users"></datalist>
                <input type="password" id="login-password" placeholder="পাসওয়ার্ড">
                <button id="login-btn" onclick="login()" class="btn-action"><span id="login-text">প্রবেশ করুন</span></button>
            </div>

            <!-- Signup View -->
            <div id="signup-view" class="auth-view" style="display:none;">
                <input type="text" id="su-username" placeholder="ইউজারনেম">
                <div id="username-status" class="status-text"></div>
                <input type="email" id="su-email" placeholder="ইমেইল">
                <div id="email-status" class="status-text"></div> <!-- ইমেইল চেক স্ট্যাটাস -->
                <input type="text" id="su-mobile" placeholder="মোবাইল নম্বর">
                <input type="password" id="su-password" placeholder="পাসওয়ার্ড">
                <button id="signup-btn" onclick="signup()" class="btn-action" style="background-color: #27ae60;"><span id="signup-text">একাউন্ট তৈরি করুন</span></button>
            </div>

            <!-- Reset View -->
            <div id="reset-view" class="auth-view" style="display:none;">
                <p style="font-size:13px; color:#7f8c8d; margin-bottom:15px;">পাসওয়ার্ড পুনরুদ্ধারের লিংকটি আপনার রেজিস্টার্ড ইমেইলে পাঠানো হবে।</p>
                <input type="email" id="reset-email" placeholder="আপনার রেজিস্টার্ড ইমেইল দিন">
                <button id="reset-btn" onclick="resetPassword()" class="btn-action" style="background-color: #f39c12;"><span id="reset-text">রিকভারি লিংক পাঠান</span></button>
            </div>
        </div>
    </div>

    <!-- Main App Section -->
    <div id="app-section" style="display:none; flex-grow:1; flex-direction:column;">
        <div class="header">
            লেনদেন খাতা 
            <button class="logout-btn" onclick="logout()">লগআউট</button>
        </div>
        
        <div class="nav">
            <button onclick="showSection('give-section', this)">টাকা দিচ্ছি</button>
            <button onclick="showSection('take-section', this)">টাকা নিচ্ছি</button>
            <button onclick="showSection('history-section', this)">ইতিহাস</button>
            <button onclick="showSection('outstanding-section', this)">মোট বকেয়া</button>
        </div>

        <div id="empty-home" class="section active">
            <h2>স্বাগতম!</h2>
            <p style="margin-top: 10px;">অনুগ্রহ করে উপরের মেনু থেকে যেকোনো একটি অপশন নির্বাচন করুন।</p>
        </div>

        <div id="give-section" class="section">
            <h3>টাকা দিচ্ছি (ধার দিলাম)</h3>
            <div class="form-grid">
                <div><label>তারিখ</label><input type="date" id="give-date"></div>
                <div><label>নাম</label><input type="text" id="give-name" list="names-list" placeholder="নাম লিখুন" oninput="autoFillMobile('give')"></div>
                <div><label>মোবাইল নম্বর</label><input type="text" id="give-mobile" list="mobiles-list" placeholder="মোবাইল নম্বর" oninput="autoFillName('give')"></div>
                <div><label>পরিমাণ (টাকা)</label><input type="number" id="give-amount" placeholder="পরিমাণ"></div>
                <div class="full-width"><button onclick="addTransaction('give')" class="btn-action">সেভ করুন</button></div>
            </div>
        </div>

        <div id="take-section" class="section">
            <h3>টাকা নিচ্ছি (পরিশোধ পেলাম)</h3>
            <div class="form-grid">
                <div><label>তারিখ</label><input type="date" id="take-date"></div>
                <div><label>নাম</label><input type="text" id="take-name" list="names-list" placeholder="নাম লিখুন" oninput="autoFillMobile('take')"></div>
                <div><label>মোবাইল নম্বর</label><input type="text" id="take-mobile" list="mobiles-list" placeholder="মোবাইল নম্বর" oninput="autoFillName('take')"></div>
                <div><label>পরিমাণ (টাকা)</label><input type="number" id="take-amount" placeholder="পরিমাণ"></div>
                <div class="full-width"><button onclick="addTransaction('take')" class="btn-action" style="background-color: #3498db;">সেভ করুন</button></div>
            </div>
        </div>
        <datalist id="names-list"></datalist>
        <datalist id="mobiles-list"></datalist>

        <div id="history-section" class="section">
            <h3>ইতিহাস</h3>
            <input type="text" id="search-name" placeholder="নাম বা মোবাইল নম্বর দিয়ে সার্চ করুন" onkeyup="renderHistory()">
            <div class="table-wrap"><div id="history-table"></div></div>
            <div class="pagination" id="pagination-controls"></div>
        </div>

        <div id="outstanding-section" class="section">
            <h3>মোট বকেয়া তালিকা</h3>
            <div class="total-box" id="total-outstanding-box">মোট বকেয়া: 0 টাকা</div>
            <div id="outstanding-list"></div>
            <div class="pagination" id="outstanding-pagination-controls"></div>
        </div>
    </div>
</div>

<div id="edit-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeEditModal()">&times;</span>
        <h3 style="margin-top:0; margin-bottom: 20px; color: #2c3e50;">তথ্য এডিট করুন</h3>
        <input type="hidden" id="edit-id">
        <input type="date" id="edit-date">
        <input type="text" id="edit-name" placeholder="নাম">
        <input type="text" id="edit-mobile" placeholder="মোবাইল নম্বর">
        <input type="number" id="edit-amount" placeholder="পরিমাণ (টাকা)">
        <select id="edit-type">
            <option value="give">টাকা দিচ্ছি</option>
            <option value="take">টাকা নিচ্ছি</option>
        </select>
        <button onclick="updateTransaction()" class="btn-action" style="background-color: #f39c12; margin-top: 10px;">আপডেট করুন</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQi-qGSjiLixmDw23MjnbvZEsdiVhfeek",
  authDomain: "due-tracking-app.firebaseapp.com",
  projectId: "due-tracking-app",
  storageBucket: "due-tracking-app.firebasestorage.app",
  messagingSenderId: "733598933470",
  appId: "1:733598933470:web:4ba0dd63240a96982a7d4f",
  measurementId: "G-ZD7L9J5RQV"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

setPersistence(auth, browserSessionPersistence);

window.auth = auth;
window.db = db;

let allTransactions = [];
let nameMobileMap = {}; 
let mobileNameMap = {}; // মোবাইল নম্বর থেকে নাম খোঁজার জন্য
let outstandingData = [];
let currentPage = 1;
let currentOutstandingPage = 1;
const itemsPerPage = 8;
let inactivityTimer;

window.showToast = function(message, isError = false) {
    const toast = document.getElementById("toast");
    toast.innerText = message;
    toast.className = "toast show " + (isError ? "error" : "success");
    setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
}

window.showAuthView = function(view) {
    document.querySelectorAll('.auth-view').forEach(v => v.style.display = 'none');
    document.getElementById(`${view}-view`).style.display = 'block';
    
    document.querySelectorAll('.auth-nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-${view}`).classList.add('active');
}

function formatDate(dateStr) {
    if(!dateStr) return "";
    const parts = dateStr.split('-');
    return `${parts[2]}-${parts[1]}-${parts[0]}`;
}

function setDefaultDates() {
    const today = new Date();
    const dd = String(today.getDate()).padStart(2, '0');
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const yyyy = today.getFullYear();
    const todayStr = `${yyyy}-${mm}-${dd}`;
    
    const giveDate = document.getElementById('give-date');
    const takeDate = document.getElementById('take-date');
    if(giveDate) giveDate.value = todayStr;
    if(takeDate) takeDate.value = todayStr;
}

// নাম লিখলে মোবাইল অটো ফিল হবে
window.autoFillMobile = function(type) {
    const nameInput = document.getElementById(`${type}-name`).value.trim();
    const mobileInput = document.getElementById(`${type}-mobile`);
    if(nameMobileMap[nameInput]) {
        mobileInput.value = nameMobileMap[nameInput];
    }
}

// মোবাইল লিখলে নাম অটো ফিল হবে
window.autoFillName = function(type) {
    const mobileInput = document.getElementById(`${type}-mobile`).value.trim();
    const nameInput = document.getElementById(`${type}-name`);
    if(mobileNameMap[mobileInput]) {
        nameInput.value = mobileNameMap[mobileInput];
    }
}

function loadSavedUsers() {
    const users = JSON.parse(localStorage.getItem('savedUsers') || '[]');
    const datalist = document.getElementById('saved-users');
    datalist.innerHTML = users.map(u => `<option value="${u}">`).join('');
}
loadSavedUsers();

function setupInactivityTimer() {
    clearTimeout(inactivityTimer);
    if (auth.currentUser) {
        inactivityTimer = setTimeout(() => {
            signOut(auth).then(() => {
                showToast("৫ মিনিট নিষ্ক্রিয় থাকার কারণে অটো লগআউট হয়েছে।", true);
                setTimeout(() => window.location.reload(), 2000);
            });
        }, 300000); 
    }
}
['mousemove', 'mousedown', 'keydown', 'touchstart'].forEach(event => {
    document.addEventListener(event, setupInactivityTimer, false);
});

// রিয়েল-টাইম ইউজারনেম চেক
const suUsernameInput = document.getElementById('su-username');
const usernameStatus = document.getElementById('username-status');
let checkUserTimeout;

suUsernameInput.addEventListener('input', () => {
    clearTimeout(checkUserTimeout);
    const username = suUsernameInput.value.trim();
    if(username.length < 3) { usernameStatus.innerText = ''; return; }
    
    checkUserTimeout = setTimeout(async () => {
        try {
            const q = query(collection(db, "users"), where("username", "==", username));
            const snapshot = await getDocs(q);
            if(!snapshot.empty) {
                usernameStatus.innerText = "Username already exist";
                usernameStatus.style.color = "red";
            } else {
                usernameStatus.innerText = "Username available";
                usernameStatus.style.color = "green";
            }
        } catch(e) { usernameStatus.innerText = ""; }
    }, 500);
});

// রিয়েল-টাইম ইমেইল চেক
const suEmailInput = document.getElementById('su-email');
const emailStatus = document.getElementById('email-status');
let checkEmailTimeout;

suEmailInput.addEventListener('input', () => {
    clearTimeout(checkEmailTimeout);
    const email = suEmailInput.value.trim().toLowerCase();
    if(email.length < 5 || !email.includes('@')) { emailStatus.innerText = ''; return; }
    
    checkEmailTimeout = setTimeout(async () => {
        try {
            const q = query(collection(db, "users"), where("email", "==", email));
            const snapshot = await getDocs(q);
            if(!snapshot.empty) {
                emailStatus.innerText = "Already used";
                emailStatus.style.color = "red";
            } else {
                emailStatus.innerText = "Email available";
                emailStatus.style.color = "green";
            }
        } catch(e) { emailStatus.innerText = ""; }
    }, 500);
});

onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('app-section').style.display = 'flex';
        
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('empty-home').classList.add('active');
        
        loadOutstanding();
        loadHistory();
        loadNames();
        setupInactivityTimer();
    } else {
        document.getElementById('auth-section').style.display = 'flex';
        document.getElementById('app-section').style.display = 'none';
        showAuthView('login'); 
        clearTimeout(inactivityTimer);
    }
});

window.signup = async function() {
    const username = document.getElementById('su-username').value.trim();
    const email = document.getElementById('su-email').value.trim().toLowerCase();
    const mobile = document.getElementById('su-mobile').value.trim(); 
    const password = document.getElementById('su-password').value;
    const signupBtn = document.getElementById('signup-btn');
    const signupText = document.getElementById('signup-text');
    
    if (!username || !email || !mobile || !password) return showToast("সব ঘর পূরণ করুন!", true);
    if(password.length < 6) return showToast("পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে!", true);
    if(usernameStatus.innerText === "Username already exist") return showToast("এই ইউজারনেম ইতিমধ্যে ব্যবহৃত হয়েছে!", true);
    if(emailStatus.innerText === "Already used") return showToast("এই ইমেইল ইতিমধ্যে ব্যবহৃত হয়েছে!", true);
    
    signupText.innerHTML = '<div class="spinner"></div> অপেক্ষা করুন...';
    signupBtn.disabled = true;

    try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        await addDoc(collection(db, "users"), {
            uid: userCredential.user.uid,
            username: username,
            email: email,
            mobile: mobile 
        });
    } catch (e) {
        let err = e.message;
        if(e.code === 'auth/email-already-in-use') err = "Already used";
        showToast(err, true);
        signupText.innerText = "একাউন্ট তৈরি করুন";
        signupBtn.disabled = false;
    }
}

window.login = async function() {
    const identifier = document.getElementById('login-identifier').value.trim();
    const password = document.getElementById('login-password').value;
    const loginBtn = document.getElementById('login-btn');
    const loginText = document.getElementById('login-text');
    
    if (!identifier || !password) return showToast("ইউজারনেম/ইমেইল এবং পাসওয়ার্ড দিন!", true);

    loginText.innerHTML = '<div class="spinner"></div> অপেক্ষা করুন...';
    loginBtn.disabled = true;

    let emailToLogin = identifier.toLowerCase();

    if(!identifier.includes('@')) {
        try {
            const q = query(collection(db, "users"), where("username", "==", identifier));
            const snapshot = await getDocs(q);
            if(snapshot.empty) {
                showToast("ইউজারনেম খুঁজে পাওয়া যায়নি!", true);
                loginText.innerText = "প্রবেশ করুন";
                loginBtn.disabled = false;
                return;
            }
            snapshot.forEach(doc => { emailToLogin = doc.data().email; });
        } catch(e) {
            showToast("ডাটাবেস এরর!", true);
            loginText.innerText = "প্রবেশ করুন";
            loginBtn.disabled = false;
            return;
        }
    }

    signInWithEmailAndPassword(auth, emailToLogin, password).then(() => {
        let users = JSON.parse(localStorage.getItem('savedUsers') || '[]');
        if(!users.includes(identifier)) {
            users.push(identifier);
            localStorage.setItem('savedUsers', JSON.stringify(users));
        }
    }).catch(e => {
        showToast("লগইন তথ্য ভুল হয়েছে!", true);
        loginText.innerText = "প্রবেশ করুন";
        loginBtn.disabled = false;
    });
}

window.resetPassword = async function() {
    const email = document.getElementById('reset-email').value.trim().toLowerCase();
    const resetBtn = document.getElementById('reset-btn');
    const resetText = document.getElementById('reset-text');
    
    if(!email) return showToast("ইমেইল দিন!", true);

    resetText.innerHTML = '<div class="spinner"></div> অপেক্ষা করুন...';
    resetBtn.disabled = true;

    try {
        const q = query(collection(db, "users"), where("email", "==", email));
        const snapshot = await getDocs(q);
        
        if(snapshot.empty) {
            showToast("Email not registered", true);
        } else {
            await sendPasswordResetEmail(auth, email);
            showToast("পাসওয়ার্ড পুনরুদ্ধার লিংক ইমেইলে পাঠানো হয়েছে!", false);
        }
    } catch(e) {
        showToast("এরর: " + e.message, true);
    } finally {
        resetText.innerText = "রিকভারি লিংক পাঠান";
        resetBtn.disabled = false;
    }
}

window.logout = function() { 
    signOut(auth).then(() => { window.location.reload(); }); 
}

window.showSection = function(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
    if(id === 'give-section' || id === 'take-section') setDefaultDates();
}

window.addTransaction = async function(type) {
    const prefix = type === 'give' ? 'give' : 'take';
    const date = document.getElementById(`${prefix}-date`).value;
    const name = document.getElementById(`${prefix}-name`).value.trim();
    const mobile = document.getElementById(`${prefix}-mobile`).value.trim();
    const amount = document.getElementById(`${prefix}-amount`).value;

    if(!date || !name || !amount) return showToast("তারিখ, নাম এবং টাকার অংশ বাধ্যতামূলক!", true);

    // একই মোবাইল নম্বর অন্য নামে দেওয়া যাবে না
    if(mobile) {
        if(mobileNameMap[mobile] && mobileNameMap[mobile] !== name) {
            return showToast("এই মোবাইল নম্বরটি অন্য নামে ব্যবহৃত (Already taken)", true);
        }
        if(nameMobileMap[name] && nameMobileMap[name] !== mobile) {
            return showToast("এই নামে অন্য মোবাইল নম্বর ব্যবহৃত হয়েছে (Already taken)", true);
        }
    }

    try {
        await addDoc(collection(db, "transactions"), {
            type: type, date: date, name: name, mobile: mobile,
            amount: parseFloat(amount), uid: auth.currentUser.uid
        });
        showToast("সফলভাবে সেভ হয়েছে!", false);
        document.getElementById(`${prefix}-name`).value = '';
        document.getElementById(`${prefix}-mobile`).value = '';
        document.getElementById(`${prefix}-amount`).value = '';
        loadOutstanding();
        loadHistory();
        loadNames();
    } catch (e) { showToast(e.message, true); }
}

window.loadNames = function() {
    const q = query(collection(db, "transactions"), where("uid", "==", auth.currentUser.uid));
    onSnapshot(q, (snapshot) => {
        let names = new Set();
        let mobiles = new Set();
        nameMobileMap = {}; 
        mobileNameMap = {}; 
        
        snapshot.forEach(doc => {
            const d = doc.data();
            names.add(d.name);
            mobiles.add(d.mobile);
            nameMobileMap[d.name] = d.mobile; 
            mobileNameMap[d.mobile] = d.name; 
        });
        
        let htmlNames = '';
        names.forEach(name => htmlNames += `<option value="${name}">`);
        document.getElementById('names-list').innerHTML = htmlNames;
        
        let htmlMobiles = '';
        mobiles.forEach(mobile => htmlMobiles += `<option value="${mobile}">`);
        document.getElementById('mobiles-list').innerHTML = htmlMobiles;
    });
}

window.loadHistory = function() {
    const q = query(collection(db, "transactions"), where("uid", "==", auth.currentUser.uid));
    onSnapshot(q, (snapshot) => {
        allTransactions = [];
        snapshot.forEach(doc => {
            allTransactions.push({ id: doc.id, ...doc.data() });
        });
        allTransactions.sort((a, b) => b.date.localeCompare(a.date)); 
        renderHistory();
    });
}

window.renderHistory = function() {
    const searchVal = document.getElementById('search-name').value.toLowerCase();
    const filtered = allTransactions.filter(t => 
        t.name.toLowerCase().includes(searchVal) || (t.mobile && t.mobile.includes(searchVal))
    );
    
    const totalPages = Math.ceil(filtered.length / itemsPerPage);
    if(currentPage > totalPages) currentPage = 1;
    
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const pageItems = filtered.slice(start, end);

    let html = `<table><tr><th>তারিখ</th><th>নাম</th><th>দিলাম</th><th>পেলাম</th><th>অ্যাকশন</th></tr>`;
    if(pageItems.length === 0) {
        html += `<tr><td colspan="5" style="text-align:center; padding: 20px;">কোন ডেটা পাওয়া যায়নি</td></tr>`;
    } else {
        pageItems.forEach(d => {
            // বন্ধনী () সরানো হয়েছে
            html += `<tr>
                <td>${formatDate(d.date)}</td>
                <td>${d.name} <br><span style="font-size:11px; color:#777;">${d.mobile}</span></td>
                <td style="color:#e74c3c; font-weight:bold;">${d.type === 'give' ? d.amount : '-'}</td>
                <td style="color:#27ae60; font-weight:bold;">${d.type === 'take' ? d.amount : '-'}</td>
                <td>
                    <button class="btn-sm bg-orange" onclick="openEditModal('${d.id}')">এডিট</button>
                    <button class="btn-sm bg-red" onclick="deleteData('${d.id}')">ডিলিট</button>
                </td>
            </tr>`;
        });
    }
    html += `</table>`;
    document.getElementById('history-table').innerHTML = html;

    let pHtml = '';
    if(currentPage > 1) pHtml += `<button onclick="changePage(${currentPage - 1})">পূর্ববর্তী</button>`;
    pHtml += `<div class="page-info">পেজ ${currentPage} / ${totalPages || 1}</div>`;
    if(currentPage < totalPages) pHtml += `<button onclick="changePage(${currentPage + 1})">পরবর্তী</button>`;
    document.getElementById('pagination-controls').innerHTML = pHtml;
}

window.changePage = function(page) {
    currentPage = page;
    renderHistory();
}

window.deleteData = async function(id) {
    if(confirm("আপনি কি এই ডেটাটি ডিলিট করতে চান?")) {
        await deleteDoc(doc(db, "transactions", id));
        showToast("ডেটা ডিলিট হয়েছে!", false);
    }
}

window.openEditModal = function(id) {
    const data = allTransactions.find(t => t.id === id);
    if(data) {
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-date').value = data.date;
        document.getElementById('edit-name').value = data.name;
        document.getElementById('edit-mobile').value = data.mobile;
        document.getElementById('edit-amount').value = data.amount;
        document.getElementById('edit-type').value = data.type;
        document.getElementById('edit-modal').style.display = 'block';
    }
}

window.closeEditModal = function() {
    document.getElementById('edit-modal').style.display = 'none';
}

window.updateTransaction = async function() {
    const id = document.getElementById('edit-id').value;
    const updatedData = {
        date: document.getElementById('edit-date').value,
        name: document.getElementById('edit-name').value,
        mobile: document.getElementById('edit-mobile').value,
        amount: parseFloat(document.getElementById('edit-amount').value),
        type: document.getElementById('edit-type').value
    };
    await updateDoc(doc(db, "transactions", id), updatedData);
    closeEditModal();
    showToast("সফলভাবে আপডেট হয়েছে!", false);
}

window.loadOutstanding = function() {
    const q = query(collection(db, "transactions"), where("uid", "==", auth.currentUser.uid));
    onSnapshot(q, (snapshot) => {
        let balances = {};
        let totalOutstanding = 0;
        outstandingData = []; 

        snapshot.forEach(doc => {
            const d = doc.data();
            if(!balances[d.name]) balances[d.name] = { given: 0, taken: 0, mobile: d.mobile };
            if(d.type === 'give') balances[d.name].given += d.amount;
            if(d.type === 'take') balances[d.name].taken += d.amount;
        });

        for(let name in balances) {
            const outstanding = balances[name].given - balances[name].taken;
            if(outstanding > 0) totalOutstanding += outstanding;
            outstandingData.push({ name, mobile: balances[name].mobile, given: balances[name].given, taken: balances[name].taken, outstanding });
        }

        document.getElementById('total-outstanding-box').innerText = `মোট বকেয়া: ${totalOutstanding} টাকা`;
        currentOutstandingPage = 1;
        renderOutstanding();
    });
}

window.renderOutstanding = function() {
    const totalPages = Math.ceil(outstandingData.length / itemsPerPage);
    if(currentOutstandingPage > totalPages) currentOutstandingPage = 1;
    
    const start = (currentOutstandingPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const pageItems = outstandingData.slice(start, end);

    let html = '';
    if(pageItems.length === 0) {
        html = "<p style='text-align:center; color:#777; margin-top:20px;'>কোন বকেয়া নেই।</p>";
    } else {
        pageItems.forEach(item => {
            const color = item.outstanding > 0 ? '#e74c3c' : '#27ae60';
            html += `<div class="outstanding-card">
                <div class="info">
                    <strong>${item.name}</strong> <span style="color:#777; font-size:13px;">(${item.mobile})</span><br>
                    <span style="font-size:13px; color:#555;">দিয়েছেন: ${item.given} | পেয়েছেন: ${item.taken}</span>
                </div>
                <div class="amount" style="color:${color};">বকেয়া: ${item.outstanding} ৳</div>
            </div>`;
        });
    }
    document.getElementById('outstanding-list').innerHTML = html;

    let pHtml = '';
    if(currentOutstandingPage > 1) pHtml += `<button onclick="changeOutstandingPage(${currentOutstandingPage - 1})">পূর্ববর্তী</button>`;
    pHtml += `<div class="page-info">পেজ ${currentOutstandingPage} / ${totalPages || 1}</div>`;
    if(currentOutstandingPage < totalPages) pHtml += `<button onclick="changeOutstandingPage(${currentOutstandingPage + 1})">পরবর্তী</button>`;
    document.getElementById('outstanding-pagination-controls').innerHTML = pHtml;
}

window.changeOutstandingPage = function(page) {
    currentOutstandingPage = page;
    renderOutstanding();
}

showAuthView('login');
</script>
