<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লেনদেন খাতা</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: auto; background: white; min-height: 100vh; box-shadow: 0 0 10px rgba(0,0,0,0.1); padding-bottom: 20px; }
        .header { background-color: #4CAF50; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }
        .nav { display: flex; justify-content: space-around; background: #333; padding: 10px 0; position: sticky; top: 0; z-index: 100; }
        .nav button { background: none; border: none; color: white; cursor: pointer; font-size: 14px; }
        .nav button.active { color: #4CAF50; font-weight: bold; border-bottom: 2px solid #4CAF50; }
        .section { padding: 20px; display: none; }
        .section.active { display: block; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; font-size: 14px;}
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .btn-danger { background-color: #f44336; padding: 5px 10px; font-size: 12px; width: auto; }
        .btn-edit { background-color: #ff9800; padding: 5px 10px; font-size: 12px; width: auto; margin-right: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 13px; }
        th { background-color: #f2f2f2; }
        .outstanding-card { background: #ffebee; padding: 15px; margin-bottom: 10px; border-left: 5px solid #f44336; border-radius: 4px; font-size: 14px; position: relative; }
        .logout-btn { background: #f44336; padding: 5px 10px; font-size: 12px; width: auto; float: right; margin-top: -5px;}
        
        /* Toast Notification */
        .toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 5px; padding: 12px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; font-size: 14px; }
        .toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        .toast.error { background-color: #f44336; }
        .toast.success { background-color: #4CAF50; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        /* Edit Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.6); }
        .modal-content { background-color: #fefefe; margin: 15% auto; padding: 20px; border-radius: 8px; width: 80%; max-width: 400px; }
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }

        /* Total Outstanding Box */
        .total-box { background: #4CAF50; color: white; padding: 10px 15px; border-radius: 5px; text-align: right; font-weight: bold; font-size: 16px; margin-bottom: 15px; }
        
        /* Pagination */
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .pagination button { width: auto; padding: 5px 15px; }
    </style>
</head>
<body>

<div class="container">
    <!-- Auth Section -->
    <div id="auth-section">
        <div class="header">লেনদেন খাতা</div>
        <div class="section" style="display:block">
            <input type="text" id="username" placeholder="ইউজারনেম (শুধু সাইন আপ এর সময়)" style="display:none;">
            <input type="text" id="email" placeholder="ইমেইল বা ইউজারনেম (লগইন এর সময়)">
            <input type="password" id="password" placeholder="পাসওয়ার্ড">
            <button id="signup-btn" onclick="signup()">সাইন আপ</button>
            <button onclick="login()" style="background:#2196F3">লগইন</button>
            <button onclick="toggleForgotPassword()" style="background:transparent; color:blue; border:1px solid blue">পাসওয়ার্ড ভুলে গেছি?</button>
            <div id="forgot-section" style="display:none; margin-top:10px;">
                <input type="email" id="reset-email" placeholder="আপনার রেজিস্টার্ড ইমেইল দিন">
                <button onclick="resetPassword()" style="background:#ff9800">রিকভারি লিংক পাঠান</button>
            </div>
        </div>
    </div>

    <!-- Main App Section -->
    <div id="app-section" style="display:none">
        <div class="header">
            লেনদেন খাতা 
            <button class="logout-btn" onclick="logout()">লগআউট</button>
        </div>
        
        <div class="nav">
            <button id="nav-give" onclick="showSection('give-section', this)">টাকা দিচ্ছি</button>
            <button id="nav-take" onclick="showSection('take-section', this)">টাকা নিচ্ছি</button>
            <button id="nav-history" onclick="showSection('history-section', this)">ইতিহাস</button>
            <button id="nav-outstanding" onclick="showSection('outstanding-section', this)">মোট বকেয়া</button>
        </div>

        <div id="give-section" class="section">
            <h3>টাকা দিচ্ছি (ধার দিলাম)</h3>
            <input type="date" id="give-date">
            <input type="text" id="give-name" list="names-list" placeholder="নাম লিখুন">
            <datalist id="names-list"></datalist>
            <input type="text" id="give-mobile" placeholder="মোবাইল নম্বর">
            <input type="number" id="give-amount" placeholder="পরিমাণ (টাকা)">
            <button onclick="addTransaction('give')">সেভ করুন</button>
        </div>

        <div id="take-section" class="section">
            <h3>টাকা নিচ্ছি (পরিশোধ পেলাম)</h3>
            <input type="date" id="take-date">
            <input type="text" id="take-name" list="names-list" placeholder="নাম লিখুন">
            <input type="text" id="take-mobile" placeholder="মোবাইল নম্বর">
            <input type="number" id="take-amount" placeholder="পরিমাণ (টাকা)">
            <button onclick="addTransaction('take')">সেভ করুন</button>
        </div>

        <div id="history-section" class="section">
            <h3>ইতিহাস (পেজিনেশন)</h3>
            <input type="text" id="search-name" placeholder="নাম লিখে সার্চ করুন" onkeyup="renderHistory()">
            <div id="history-table"></div>
            <div class="pagination" id="pagination-controls"></div>
        </div>

        <div id="outstanding-section" class="section">
            <h3>মোট বকেয়া তালিকা</h3>
            <div class="total-box" id="total-outstanding-box">মোট বকেয়া: 0 টাকা</div>
            <div id="outstanding-list"></div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div id="edit-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeEditModal()">&times;</span>
        <h3 style="margin-top:0;">তথ্য এডিট করুন</h3>
        <input type="hidden" id="edit-id">
        <input type="date" id="edit-date">
        <input type="text" id="edit-name" placeholder="নাম">
        <input type="text" id="edit-mobile" placeholder="মোবাইল নম্বর">
        <input type="number" id="edit-amount" placeholder="পরিমাণ (টাকা)">
        <select id="edit-type">
            <option value="give">টাকা দিচ্ছি</option>
            <option value="take">টাকা নিচ্ছি</option>
        </select>
        <button onclick="updateTransaction()" style="margin-top:10px;">আপডেট করুন</button>
    </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, fetchSignInMethodsForEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// আপনার দেওয়া Firebase Config এখানে বসানো হয়েছে
const firebaseConfig = {
  apiKey: "AIzaSyAQi-qGSjiLixmDw23MjnbvZEsdiVhfeek",
  authDomain: "due-tracking-app.firebaseapp.com",
  projectId: "due-tracking-app",
  storageBucket: "due-tracking-app.firebasestorage.app",
  messagingSenderId: "733598933470",
  appId: "1:733598933470:web:4ba0dd63240a96982a7d4f",
  measurementId: "G-ZD7L9J5RQV"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.auth = auth;
window.db = db;

let allTransactions = [];
let currentPage = 1;
const itemsPerPage = 8;

// Toast Function
window.showToast = function(message, isError = false) {
    const toast = document.getElementById("toast");
    toast.innerText = message;
    toast.className = "toast show " + (isError ? "error" : "success");
    setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
}

onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('app-section').style.display = 'block';
        loadOutstanding();
        loadHistory();
        loadNames();
    } else {
        document.getElementById('auth-section').style.display = 'block';
        document.getElementById('app-section').style.display = 'none';
        // Reset to login view
        document.getElementById('username').style.display = 'none';
        document.getElementById('email').placeholder = 'ইমেইল বা ইউজারনেম (লগইন এর সময়)';
    }
});

window.toggleForgotPassword = function() {
    const div = document.getElementById('forgot-section');
    div.style.display = div.style.display === 'none' ? 'block' : 'none';
}

window.signup = async function() {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const signupBtn = document.getElementById('signup-btn');
    
    if (!username || !email || !password) return showToast("সব ঘর পূরণ করুন!", true);
    if(password.length < 6) return showToast("পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে!", true);
    
    signupBtn.innerText = "অপেক্ষা করুন...";
    signupBtn.disabled = true;

    try {
        // Check if email already exists
        const methods = await fetchSignInMethodsForEmail(auth, email);
        if(methods.length > 0) {
            showToast("এই ইমেইল দিয়ে আগেই সাইন আপ করা হয়েছে!", true);
            signupBtn.innerText = "সাইন আপ";
            signupBtn.disabled = false;
            return;
        }

        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        // Save username in Firestore
        await addDoc(collection(db, "users"), {
            uid: userCredential.user.uid,
            username: username,
            email: email
        });
        
    } catch (e) {
        showToast("এরর: " + e.message, true);
        signupBtn.innerText = "সাইন আপ";
        signupBtn.disabled = false;
    }
}

// Show Username field when clicking Sign Up button
document.getElementById('signup-btn').addEventListener('click', function(e) {
    if(document.getElementById('username').style.display === 'none') {
        e.preventDefault();
        document.getElementById('username').style.display = 'block';
        document.getElementById('email').placeholder = 'ইমেইল (যেমন: name@gmail.com)';
        this.innerText = 'সাইন আপ নিশ্চিত করুন';
        return;
    }
});

window.login = async function() {
    const identifier = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!identifier || !password) return showToast("ইউজারনেম/ইমেইল এবং পাসওয়ার্ড দিন!", true);

    let emailToLogin = identifier;

    // If input is not an email, treat as username
    if(!identifier.includes('@')) {
        const q = query(collection(db, "users"), where("username", "==", identifier));
        const snapshot = await getDocs(q);
        if(snapshot.empty) return showToast("ইউজারনেম খুঁজে পাওয়া যায়নি!", true);
        snapshot.forEach(doc => { emailToLogin = doc.data().email; });
    }

    signInWithEmailAndPassword(auth, emailToLogin, password).catch(e => showToast("লগইন তথ্য ভুল হয়েছে!", true));
}

window.resetPassword = async function() {
    const email = document.getElementById('reset-email').value.trim();
    if(!email) return showToast("ইমেইল দিন!", true);

    try {
        const methods = await fetchSignInMethodsForEmail(auth, email);
        if(methods.length === 0) {
            showToast("Email not registered", true);
        } else {
            await sendPasswordResetEmail(auth, email);
            showToast("পাসওয়ার্ড রিকভারি লিংক ইমেইলে পাঠানো হয়েছে!", false);
        }
    } catch(e) {
        showToast("এরর: " + e.message, true);
    }
}

window.logout = function() { signOut(auth); }

window.showSection = function(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}

window.addTransaction = async function(type) {
    const prefix = type === 'give' ? 'give' : 'take';
    const date = document.getElementById(`${prefix}-date`).value;
    const name = document.getElementById(`${prefix}-name`).value;
    const mobile = document.getElementById(`${prefix}-mobile`).value;
    const amount = document.getElementById(`${prefix}-amount`).value;

    if(!date || !name || !amount) return showToast("তারিখ, নাম এবং টাকার অংশ বাধ্যতামূলক!", true);

    try {
        await addDoc(collection(db, "transactions"), {
            type: type, date: date, name: name, mobile: mobile,
            amount: parseFloat(amount), uid: auth.currentUser.uid
        });
        showToast("সফলভাবে সেভ হয়েছে!", false);
        loadOutstanding();
        loadHistory();
        loadNames();
    } catch (e) { showToast(e.message, true); }
}

window.loadNames = function() {
    const q = query(collection(db, "transactions"), where("uid", "==", auth.currentUser.uid));
    onSnapshot(q, (snapshot) => {
        let names = new Set();
        snapshot.forEach(doc => names.add(doc.data().name));
        let html = '';
        names.forEach(name => html += `<option value="${name}">`);
        document.getElementById('names-list').innerHTML = html;
    });
}

window.loadHistory = function() {
    const q = query(collection(db, "transactions"), where("uid", "==", auth.currentUser.uid));
    onSnapshot(q, (snapshot) => {
        allTransactions = [];
        snapshot.forEach(doc => {
            allTransactions.push({ id: doc.id, ...doc.data() });
        });
        allTransactions.sort((a, b) => b.date.localeCompare(a.date)); // Sort by date desc
        renderHistory();
    });
}

window.renderHistory = function() {
    const searchVal = document.getElementById('search-name').value.toLowerCase();
    const filtered = allTransactions.filter(t => t.name.toLowerCase().includes(searchVal));
    
    const totalPages = Math.ceil(filtered.length / itemsPerPage);
    if(currentPage > totalPages) currentPage = 1;
    
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const pageItems = filtered.slice(start, end);

    let html = `<table><tr><th>তারিখ</th><th>নাম</th><th>দিলাম</th><th>পেলাম</th><th>অ্যাকশন</th></tr>`;
    if(pageItems.length === 0) {
        html += `<tr><td colspan="5" style="text-align:center;">কোন ডেটা পাওয়া যায়নি</td></tr>`;
    } else {
        pageItems.forEach(d => {
            html += `<tr>
                <td>${d.date}</td>
                <td>${d.name} <br>(${d.mobile})</td>
                <td style="color:red">${d.type === 'give' ? d.amount : ''}</td>
                <td style="color:green">${d.type === 'take' ? d.amount : ''}</td>
                <td>
                    <button class="btn-edit" onclick="openEditModal('${d.id}')">এডিট</button>
                    <button class="btn-danger" onclick="deleteData('${d.id}')">ডিলিট</button>
                </td>
            </tr>`;
        });
    }
    html += `</table>`;
    document.getElementById('history-table').innerHTML = html;

    // Pagination Controls
    let pHtml = '';
    if(currentPage > 1) pHtml += `<button onclick="changePage(${currentPage - 1})">পূর্ববর্তী</button>`;
    pHtml += `<span style="padding: 5px 10px; border: 1px solid #ccc; border-radius: 5px;">পেজ ${currentPage} / ${totalPages || 1}</span>`;
    if(currentPage < totalPages) pHtml += `<button onclick="changePage(${currentPage + 1})">পরবর্তী</button>`;
    document.getElementById('pagination-controls').innerHTML = pHtml;
}

window.changePage = function(page) {
    currentPage = page;
    renderHistory();
}

window.deleteData = async function(id) {
    if(confirm("আপনি কি এই ডেটাটি ডিলিট করতে চান?")) {
        await deleteDoc(doc(db, "transactions", id));
        showToast("ডেটা ডিলিট হয়েছে!", false);
    }
}

window.openEditModal = function(id) {
    const data = allTransactions.find(t => t.id === id);
    if(data) {
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-date').value = data.date;
        document.getElementById('edit-name').value = data.name;
        document.getElementById('edit-mobile').value = data.mobile;
        document.getElementById('edit-amount').value = data.amount;
        document.getElementById('edit-type').value = data.type;
        document.getElementById('edit-modal').style.display = 'block';
    }
}

window.closeEditModal = function() {
    document.getElementById('edit-modal').style.display = 'none';
}

window.updateTransaction = async function() {
    const id = document.getElementById('edit-id').value;
    const updatedData = {
        date: document.getElementById('edit-date').value,
        name: document.getElementById('edit-name').value,
        mobile: document.getElementById('edit-mobile').value,
        amount: parseFloat(document.getElementById('edit-amount').value),
        type: document.getElementById('edit-type').value
    };
    await updateDoc(doc(db, "transactions", id), updatedData);
    closeEditModal();
    showToast("সফলভাবে আপডেট হয়েছে!", false);
}

window.loadOutstanding = function() {
    const q = query(collection(db, "transactions"), where("uid", "==", auth.currentUser.uid));
    onSnapshot(q, (snapshot) => {
        let balances = {};
        let totalOutstanding = 0;
        snapshot.forEach(doc => {
            const d = doc.data();
            if(!balances[d.name]) balances[d.name] = { given: 0, taken: 0, mobile: d.mobile };
            if(d.type === 'give') balances[d.name].given += d.amount;
            if(d.type === 'take') balances[d.name].taken += d.amount;
        });

        let html = '';
        for(let name in balances) {
            const outstanding = balances[name].given - balances[name].taken;
            if(outstanding > 0) totalOutstanding += outstanding; // Add to total
            const color = outstanding > 0 ? 'red' : 'green';
            html += `<div class="outstanding-card">
                <strong>${name}</strong> (${balances[name].mobile})<br>
                দিয়েছেন: ${balances[name].given} | পেয়েছেন: ${balances[name].taken} |<br>
                <span style="color:${color}; font-weight:bold; font-size:16px;">বকেয়া: ${outstanding} টাকা</span>
            </div>`;
        }
        document.getElementById('outstanding-list').innerHTML = html || "<p>কোন বকেয়া নেই।</p>";
        document.getElementById('total-outstanding-box').innerText = `মোট বকেয়া: ${totalOutstanding} টাকা`;
    });
}
</script>
</body>
</html>
