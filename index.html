<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লেনদেন খাতা</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f5; color: #333; line-height: 1.5; }
        
        .container { max-width: 900px; margin: 20px auto; background: white; min-height: calc(100vh - 40px); box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-radius: 10px; overflow: hidden; }
        
        .header { background-color: #4CAF50; color: white; padding: 15px 20px; font-size: 20px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logout-btn { background: #f44336; padding: 6px 12px; font-size: 13px; width: auto; border-radius: 5px; }
        
        .nav { display: flex; background: #333; padding: 0; overflow-x: auto; }
        .nav button { flex: 1; background: none; border: none; color: #aaa; cursor: pointer; font-size: 15px; padding: 15px 10px; text-align: center; white-space: nowrap; transition: 0.3s; border-bottom: 3px solid transparent; }
        .nav button.active { color: #fff; background: #222; border-bottom: 3px solid #4CAF50; font-weight: bold; }
        .nav button:hover { color: #fff; }
        
        .section { padding: 20px; display: none; }
        .section.active { display: block; }
        .section h3 { margin-bottom: 20px; color: #4CAF50; border-bottom: 2px solid #e0e0e0; padding-bottom: 5px; }
        
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; transition: border-color 0.3s; }
        input:focus { border-color: #4CAF50; outline: none; }
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; padding: 12px; border-radius: 6px; font-size: 15px; font-weight: bold; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:hover { background-color: #45a049; }
        button:disabled { background-color: #ccc !important; cursor: not-allowed; }
        .btn-secondary { background: #2196F3; }
        .btn-secondary:hover { background: #1976D2; }
        .btn-warning { background: #ff9800; }
        .btn-warning:hover { background: #e68a00; }
        .btn-link { background: transparent; color: #2196F3; border: 1px solid #2196F3; }
        .btn-link:hover { background: #f0f8ff; }
        
        /* Spinner CSS */
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 15px; border-radius: 6px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { border-bottom: 1px solid #ddd; padding: 12px 10px; text-align: left; font-size: 14px; }
        th { background-color: #f8f9fa; color: #555; font-weight: 600; position: sticky; top: 0; }
        tr:hover { background-color: #f1f1f1; }
        .btn-action { padding: 6px 12px; font-size: 12px; width: auto; margin-right: 5px; border-radius: 4px; }
        .btn-danger { background: #f44336; }
        .btn-danger:hover { background: #d32f2f; }
        .btn-edit { background: #ff9800; }
        .btn-edit:hover { background: #e68a00; }

        .outstanding-card { background: #fff; padding: 15px; margin-bottom: 15px; border-left: 5px solid #f44336; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .outstanding-card .info { flex: 1; min-width: 200px; }
        .outstanding-card .amount { font-weight: bold; font-size: 18px; color: #f44336; text-align: right; }
        .total-box { background: #4CAF50; color: white; padding: 15px; border-radius: 6px; text-align: right; font-weight: bold; font-size: 18px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .toast { visibility: hidden; min-width: 250px; width: 90%; max-width: 400px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; font-size: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        .toast.error { background-color: #f44336; }
        .toast.success { background-color: #4CAF50; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.6); }
        .modal-content { background-color: #fff; margin: 10% auto; padding: 25px; border-radius: 10px; width: 90%; max-width: 450px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close-btn:hover { color: #333; }

        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .pagination button { width: auto; padding: 8px 16px; border-radius: 5px; }
        .page-info { padding: 8px 16px; border: 1px solid #ddd; border-radius: 5px; display: flex; align-items: center; font-size: 14px; color: #555; }

        @media (min-width: 768px) {
            .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
            .form-grid .full-width { grid-column: span 2; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Auth Section -->
    <div id="auth-section">
        <div class="header">লেনদেন খাতা</div>
        <div class="section" style="display:block; max-width: 450px; margin: 0 auto;">
            <div class="form-group">
                <input type="text" id="username" placeholder="ইউজারনেম (শুধু সাইন আপ এর সময়)" style="display:none;">
                <input type="text" id="email" placeholder="ইমেইল বা ইউজারনেম">
                <input type="password" id="password" placeholder="পাসওয়ার্ড">
                
                <button id="login-btn" onclick="login()" class="btn-secondary" style="margin-bottom: 10px;"><span id="login-text">লগইন</span></button>
                <button id="signup-btn" onclick="signup()"><span id="signup-text">সাইন আপ</span></button>
                
                <button onclick="toggleForgotPassword()" class="btn-link" style="margin-top: 15px;">পাসওয়ার্ড ভুলে গেছি?</button>
                
                <div id="forgot-section" style="display:none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;">
                    <input type="email" id="reset-email" placeholder="আপনার রেজিস্টার্ড ইমেইল দিন">
                    <button id="reset-btn" onclick="resetPassword()" class="btn-warning"><span id="reset-text">রিকভারি লিংক পাঠান</span></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App Section -->
    <div id="app-section" style="display:none">
        <div class="header">
            লেনদেন খাতা 
            <button class="logout-btn" onclick="logout()">লগআউট</button>
        </div>
        
        <div class="nav">
            <button id="nav-give" onclick="showSection('give-section', this)">টাকা দিচ্ছি</button>
            <button id="nav-take" onclick="showSection('take-section', this)">টাকা নিচ্ছি</button>
            <button id="nav-history" onclick="showSection('history-section', this)">ইতিহাস</button>
            <button id="nav-outstanding" onclick="showSection('outstanding-section', this)">মোট বকেয়া</button>
        </div>

        <div id="give-section" class="section">
            <h3>টাকা দিচ্ছি (ধার দিলাম)</h3>
            <div class="form-grid">
                <div><label>তারিখ</label><input type="date" id="give-date"></div>
                <div><label>নাম</label><input type="text" id="give-name" list="names-list" placeholder="নাম লিখুন" oninput="autoFillMobile('give')"></div>
                <div><label>মোবাইল নম্বর</label><input type="text" id="give-mobile" placeholder="মোবাইল নম্বর"></div>
                <div><label>পরিমাণ (টাকা)</label><input type="number" id="give-amount" placeholder="পরিমাণ"></div>
                <div class="full-width"><button onclick="addTransaction('give')">সেভ করুন</button></div>
            </div>
        </div>

        <div id="take-section" class="section">
            <h3>টাকা নিচ্ছি (পরিশোধ পেলাম)</h3>
            <div class="form-grid">
                <div><label>তারিখ</label><input type="date" id="take-date"></div>
                <div><label>নাম</label><input type="text" id="take-name" list="names-list" placeholder="নাম লিখুন" oninput="autoFillMobile('take')"></div>
                <div><label>মোবাইল নম্বর</label><input type="text" id="take-mobile" placeholder="মোবাইল নম্বর"></div>
                <div><label>পরিমাণ (টাকা)</label><input type="number" id="take-amount" placeholder="পরিমাণ"></div>
                <div class="full-width"><button onclick="addTransaction('take')" class="btn-secondary">সেভ করুন</button></div>
            </div>
        </div>
        <datalist id="names-list"></datalist>

        <div id="history-section" class="section">
            <h3>ইতিহাস</h3>
            <input type="text" id="search-name" placeholder="নাম বা মোবাইল নম্বর দিয়ে সার্চ করুন" onkeyup="renderHistory()">
            <div class="table-wrap"><div id="history-table"></div></div>
            <div class="pagination" id="pagination-controls"></div>
        </div>

        <div id="outstanding-section" class="section">
            <h3>মোট বকেয়া তালিকা</h3>
            <div class="total-box" id="total-outstanding-box">মোট বকেয়া: 0 টাকা</div>
            <div id="outstanding-list"></div>
            <div class="pagination" id="outstanding-pagination-controls"></div>
        </div>
    </div>
</div>

<div id="edit-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeEditModal()">&times;</span>
        <h3 style="margin-top:0; margin-bottom: 20px; color: #4CAF50;">তথ্য এডিট করুন</h3>
        <input type="hidden" id="edit-id">
        <input type="date" id="edit-date">
        <input type="text" id="edit-name" placeholder="নাম">
        <input type="text" id="edit-mobile" placeholder="মোবাইল নম্বর">
        <input type="number" id="edit-amount" placeholder="পরিমাণ (টাকা)">
        <select id="edit-type">
            <option value="give">টাকা দিচ্ছি</option>
            <option value="take">টাকা নিচ্ছি</option>
        </select>
        <button onclick="updateTransaction()" class="btn-warning" style="margin-top: 10px; width: 100%;">আপডেট করুন</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQi-qGSjiLixmDw23MjnbvZEsdiVhfeek",
  authDomain: "due-tracking-app.firebaseapp.com",
  projectId: "due-tracking-app",
  storageBucket: "due-tracking-app.firebasestorage.app",
  messagingSenderId: "733598933470",
  appId: "1:733598933470:web:4ba0dd63240a96982a7d4f",
  measurementId: "G-ZD7L9J5RQV"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.auth = auth;
window.db = db;

let allTransactions = [];
let nameMobileMap = {}; // নাম ও মোবাইল নম্বর ম্যাপ করার জন্য
let outstandingData = [];
let currentPage = 1;
let currentOutstandingPage = 1;
const itemsPerPage = 8;
let inactivityTimer;

window.showToast = function(message, isError = false) {
    const toast = document.getElementById("toast");
    toast.innerText = message;
    toast.className = "toast show " + (isError ? "error" : "success");
    setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
}

function formatDate(dateStr) {
    if(!dateStr) return "";
    const parts = dateStr.split('-');
    return `${parts[2]}-${parts[1]}-${parts[0]}`;
}

function setDefaultDates() {
    const today = new Date();
    const dd = String(today.getDate()).padStart(2, '0');
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const yyyy = today.getFullYear();
    const todayStr = `${yyyy}-${mm}-${dd}`;
    
    const giveDate = document.getElementById('give-date');
    const takeDate = document.getElementById('take-date');
    if(giveDate) giveDate.value = todayStr;
    if(takeDate) takeDate.value = todayStr;
}

// নাম লিখলে মোবাইল নম্বর অটো ফিল হবে
window.autoFillMobile = function(type) {
    const nameInput = document.getElementById(`${type}-name`).value.trim();
    const mobileInput = document.getElementById(`${type}-mobile`);
    if(nameMobileMap[nameInput]) {
        mobileInput.value = nameMobileMap[nameInput];
    }
}

function setupInactivityTimer() {
    clearTimeout(inactivityTimer);
    if (auth.currentUser) {
        inactivityTimer = setTimeout(() => {
            signOut(auth).then(() => {
                showToast("৫ মিনিট নিষ্ক্রিয় থাকার কারণে অটো লগআউট হয়েছে।", true);
            });
        }, 300000); // 5 minutes
    }
}
['mousemove', 'mousedown', 'keydown', 'touchstart'].forEach(event => {
    document.addEventListener(event, setupInactivityTimer, false);
});

onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('app-section').style.display = 'block';
        setDefaultDates();
        loadOutstanding();
        loadHistory();
        loadNames();
        setupInactivityTimer();
    } else {
        document.getElementById('auth-section').style.display = 'block';
        document.getElementById('app-section').style.display = 'none';
        document.getElementById('username').style.display = 'none';
        document.getElementById('email').placeholder = 'ইমেইল বা ইউজারনেম';
        document.getElementById('signup-btn').innerText = 'সাইন আপ';
        clearTimeout(inactivityTimer);
    }
});

window.toggleForgotPassword = function() {
    const div = document.getElementById('forgot-section');
    div.style.display = div.style.display === 'none' ? 'block' : 'none';
}

window.signup = async function() {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim().toLowerCase(); // lowercase
    const password = document.getElementById('password').value;
    const signupBtn = document.getElementById('signup-btn');
    const signupText = document.getElementById('signup-text');
    
    if(document.getElementById('username').style.display === 'none') {
        document.getElementById('username').style.display = 'block';
        document.getElementById('email').placeholder = 'ইমেইল (যেমন: name@gmail.com)';
        signupText.innerText = 'সাইন আপ নিশ্চিত করুন';
        return;
    }
    
    if (!username || !email || !password) return showToast("সব ঘর পূরণ করুন!", true);
    if(password.length < 6) return showToast("পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে!", true);
    
    signupText.innerHTML = '<div class="spinner"></div> অপেক্ষা করুন...';
    signupBtn.disabled = true;

    try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        await addDoc(collection(db, "users"), {
            uid: userCredential.user.uid,
            username: username,
            email: email // lowercase save
        });
    } catch (e) {
        let err = e.message;
        if(e.code === 'auth/email-already-in-use') err = "এই ইমেইল দিয়ে আগেই সাইন আপ করা হয়েছে!";
        showToast(err, true);
        signupText.innerText = "সাইন আপ নিশ্চিত করুন";
        signupBtn.disabled = false;
    }
}

window.login = async function() {
    const identifier = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const loginBtn = document.getElementById('login-btn');
    const loginText = document.getElementById('login-text');
    
    if (!identifier || !password) return showToast("ইউজারনেম/ইমেইল এবং পাসওয়ার্ড দিন!", true);

    loginText.innerHTML = '<div class="spinner"></div> অপেক্ষা করুন...';
    loginBtn.disabled = true;

    let emailToLogin = identifier.toLowerCase();

    if(!identifier.includes('@')) {
        try {
            const q = query(collection(db, "users"), where("username", "==", identifier));
            const snapshot = await getDocs(q);
            if(snapshot.empty) {
                showToast("ইউজারনেম খুঁজে পাওয়া যায়নি!", true);
                loginText.innerText = "লগইন";
                loginBtn.disabled = false;
                return;
            }
            snapshot.forEach(doc => { emailToLogin = doc.data().email; });
        } catch(e) {
            showToast("ডাটাবেস এরর!", true);
            loginText.innerText = "লগইন";
            loginBtn.disabled = false;
            return;
        }
    }

    signInWithEmailAndPassword(auth, emailToLogin, password).catch(e => {
        showToast("লগইন তথ্য ভুল হয়েছে!", true);
        loginText.innerText = "লগইন";
        loginBtn.disabled = false;
    });
}

window.resetPassword = async function() {
    const email = document.getElementById('reset-email').value.trim().toLowerCase(); // lowercase
    const resetBtn = document.getElementById('reset-btn');
    const resetText = document.getElementById('reset-text');
    
    if(!email) return showToast("ইমেইল দিন!", true);

    resetText.innerHTML = '<div class="spinner"></div> অপেক্ষা করুন...';
    resetBtn.disabled = true;

    try {
        const q = query(collection(db, "users"), where("email", "==", email));
        const snapshot = await getDocs(q);
        
        if(snapshot.empty) {
            showToast("Email not registered", true);
            resetText.innerText = "রিকভারি লিংক পাঠান";
            resetBtn.disabled = false;
        } else {
            await sendPasswordResetEmail(auth, email);
            showToast("পাসওয়ার্ড রিকভারি লিংক ইমেইলে পাঠানো হয়েছে!", false);
            resetText.innerText = "রিকভারি লিংক পাঠান";
            resetBtn.disabled = false;
        }
    } catch(e) {
        showToast("এরর: " + e.message, true);
        resetText.innerText = "রিকভারি লিংক পাঠান";
        resetBtn.disabled = false;
    }
}

window.logout = function() { signOut(auth); }

window.showSection = function(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
    if(id === 'give-section' || id === 'take-section') setDefaultDates();
}

window.addTransaction = async function(type) {
    const prefix = type === 'give' ? 'give' : 'take';
    const date = document.getElementById(`${prefix}-date`).value;
    const name = document.getElementById(`${prefix}-name`).value;
    const mobile = document.getElementById(`${prefix}-mobile`).value;
    const amount = document.getElementById(`${prefix}-amount`).value;

    if(!date || !name || !amount) return showToast("তারিখ, নাম এবং টাকার অংশ বাধ্যতামূলক!", true);

    try {
        await addDoc(collection(db, "transactions"), {
            type: type, date: date, name: name, mobile: mobile,
            amount: parseFloat(amount), uid: auth.currentUser.uid
        });
        showToast("সফলভাবে সেভ হয়েছে!", false);
        document.getElementById(`${prefix}-name`).value = '';
        document.getElementById(`${prefix}-mobile`).value = '';
        document.getElementById(`${prefix}-amount`).value = '';
        loadOutstanding();
        loadHistory();
        loadNames();
    } catch (e) { showToast(e.message, true); }
}

window.loadNames = function() {
    const q = query(collection(db, "transactions"), where("uid", "==", auth.currentUser.uid));
    onSnapshot(q, (snapshot) => {
        let names = new Set();
        snapshot.forEach(doc => {
            const d = doc.data();
            names.add(d.name);
            nameMobileMap[d.name] = d.mobile; // নামের সাথে মোবাইল সেভ করছি
        });
        let html = '';
        names.forEach(name => html += `<option value="${name}">`);
        document.getElementById('names-list').innerHTML = html;
    });
}

window.loadHistory = function() {
    const q = query(collection(db, "transactions"), where("uid", "==", auth.currentUser.uid));
    onSnapshot(q, (snapshot) => {
        allTransactions = [];
        snapshot.forEach(doc => {
            allTransactions.push({ id: doc.id, ...doc.data() });
        });
        allTransactions.sort((a, b) => b.date.localeCompare(a.date)); 
        renderHistory();
    });
}

window.renderHistory = function() {
    const searchVal = document.getElementById('search-name').value.toLowerCase();
    // নাম অথবা মোবাইল নম্বর দিয়ে সার্চ করার অপশন
    const filtered = allTransactions.filter(t => 
        t.name.toLowerCase().includes(searchVal) || (t.mobile && t.mobile.includes(searchVal))
    );
    
    const totalPages = Math.ceil(filtered.length / itemsPerPage);
    if(currentPage > totalPages) currentPage = 1;
    
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const pageItems = filtered.slice(start, end);

    let html = `<table><tr><th>তারিখ</th><th>নাম</th><th>দিলাম</th><th>পেলাম</th><th>অ্যাকশন</th></tr>`;
    if(pageItems.length === 0) {
        html += `<tr><td colspan="5" style="text-align:center; padding: 20px;">কোন ডেটা পাওয়া যায়নি</td></tr>`;
    } else {
        pageItems.forEach(d => {
            html += `<tr>
                <td>${formatDate(d.date)}</td>
                <td>${d.name} <br><span style="font-size:11px; color:#777;">(${d.mobile})</span></td>
                <td style="color:red; font-weight:bold;">${d.type === 'give' ? d.amount : '-'}</td>
                <td style="color:green; font-weight:bold;">${d.type === 'take' ? d.amount : '-'}</td>
                <td>
                    <button class="btn-action btn-edit" onclick="openEditModal('${d.id}')">এডিট</button>
                    <button class="btn-action btn-danger" onclick="deleteData('${d.id}')">ডিলিট</button>
                </td>
            </tr>`;
        });
    }
    html += `</table>`;
    document.getElementById('history-table').innerHTML = html;

    let pHtml = '';
    if(currentPage > 1) pHtml += `<button onclick="changePage(${currentPage - 1})">পূর্ববর্তী</button>`;
    pHtml += `<div class="page-info">পেজ ${currentPage} / ${totalPages || 1}</div>`;
    if(currentPage < totalPages) pHtml += `<button onclick="changePage(${currentPage + 1})">পরবর্তী</button>`;
    document.getElementById('pagination-controls').innerHTML = pHtml;
}

window.changePage = function(page) {
    currentPage = page;
    renderHistory();
}

window.deleteData = async function(id) {
    if(confirm("আপনি কি এই ডেটাটি ডিলিট করতে চান?")) {
        await deleteDoc(doc(db, "transactions", id));
        showToast("ডেটা ডিলিট হয়েছে!", false);
    }
}

window.openEditModal = function(id) {
    const data = allTransactions.find(t => t.id === id);
    if(data) {
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-date').value = data.date;
        document.getElementById('edit-name').value = data.name;
        document.getElementById('edit-mobile').value = data.mobile;
        document.getElementById('edit-amount').value = data.amount;
        document.getElementById('edit-type').value = data.type;
        document.getElementById('edit-modal').style.display = 'block';
    }
}

window.closeEditModal = function() {
    document.getElementById('edit-modal').style.display = 'none';
}

window.updateTransaction = async function() {
    const id = document.getElementById('edit-id').value;
    const updatedData = {
        date: document.getElementById('edit-date').value,
        name: document.getElementById('edit-name').value,
        mobile: document.getElementById('edit-mobile').value,
        amount: parseFloat(document.getElementById('edit-amount').value),
        type: document.getElementById('edit-type').value
    };
    await updateDoc(doc(db, "transactions", id), updatedData);
    closeEditModal();
    showToast("সফলভাবে আপডেট হয়েছে!", false);
}

window.loadOutstanding = function() {
    const q = query(collection(db, "transactions"), where("uid", "==", auth.currentUser.uid));
    onSnapshot(q, (snapshot) => {
        let balances = {};
        let totalOutstanding = 0;
        outstandingData = []; // পেজিনেশনের জন্য আরে ক্লিয়ার

        snapshot.forEach(doc => {
            const d = doc.data();
            if(!balances[d.name]) balances[d.name] = { given: 0, taken: 0, mobile: d.mobile };
            if(d.type === 'give') balances[d.name].given += d.amount;
            if(d.type === 'take') balances[d.name].taken += d.amount;
        });

        for(let name in balances) {
            const outstanding = balances[name].given - balances[name].taken;
            if(outstanding > 0) totalOutstanding += outstanding;
            outstandingData.push({ name, mobile: balances[name].mobile, given: balances[name].given, taken: balances[name].taken, outstanding });
        }

        document.getElementById('total-outstanding-box').innerText = `মোট বকেয়া: ${totalOutstanding} টাকা`;
        currentOutstandingPage = 1;
        renderOutstanding();
    });
}

window.renderOutstanding = function() {
    const totalPages = Math.ceil(outstandingData.length / itemsPerPage);
    if(currentOutstandingPage > totalPages) currentOutstandingPage = 1;
    
    const start = (currentOutstandingPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const pageItems = outstandingData.slice(start, end);

    let html = '';
    if(pageItems.length === 0) {
        html = "<p style='text-align:center; color:#777; margin-top:20px;'>কোন বকেয়া নেই।</p>";
    } else {
        pageItems.forEach(item => {
            const color = item.outstanding > 0 ? '#f44336' : '#4CAF50';
            html += `<div class="outstanding-card">
                <div class="info">
                    <strong>${item.name}</strong> <span style="color:#777; font-size:13px;">(${item.mobile})</span><br>
                    <span style="font-size:13px; color:#555;">দিয়েছেন: ${item.given} | পেয়েছেন: ${item.taken}</span>
                </div>
                <div class="amount" style="color:${color};">বকেয়া: ${item.outstanding} ৳</div>
            </div>`;
        });
    }
    document.getElementById('outstanding-list').innerHTML = html;

    // Pagination Controls for Outstanding
    let pHtml = '';
    if(currentOutstandingPage > 1) pHtml += `<button onclick="changeOutstandingPage(${currentOutstandingPage - 1})">পূর্ববর্তী</button>`;
    pHtml += `<div class="page-info">পেজ ${currentOutstandingPage} / ${totalPages || 1}</div>`;
    if(currentOutstandingPage < totalPages) pHtml += `<button onclick="changeOutstandingPage(${currentOutstandingPage + 1})">পরবর্তী</button>`;
    document.getElementById('outstanding-pagination-controls').innerHTML = pHtml;
}

window.changeOutstandingPage = function(page) {
    currentOutstandingPage = page;
    renderOutstanding();
}
</script>
</body>
</html>
